# Setup Test Environment (Enterprise)
# Composite Action
# Spins up PostgreSQL, Temporal, and AutoKitteh‑EE in Docker for CI jobs.

---
name: Setup Test Environment (Enterprise)
description: Start PostgreSQL, Temporal and the AutoKitteh EE container using Docker
inputs:
  descope-project-id:
    description: Descope project ID
    required: true
  browser:
    description: Browser under test (e.g. Chromium, Firefox, Safari)
    required: true
  autokitteh-image:
    description: AutoKitteh EE Docker image tag
    required: true
  rsa-private-key:
    description: RSA private key for JWT signing
    required: true
  rsa-public-key:
    description: RSA public key for JWT verification
    required: true
  temporal-version:
    description: Temporal auto-setup image tag (e.g. 1.24.2)
    required: true
  temporal-encryption-keys:
    description: Comma-separated list of encryption keys
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Pre-cache Docker images
      shell: bash
      run: |
        echo "~~~~~~Pre-cache Docker images~~~~~~"
        docker pull postgres:15-alpine
        docker pull temporalio/auto-setup:${{ inputs.temporal-version }}
        docker pull ${{ inputs.autokitteh-image }}
    - name: Clean up old containers / volumes
      shell: bash
      run: |
        echo "~~~~~~Docker cleanup before spin-up~~~~~~"
        docker rm -f $(docker ps -aq) 2>/dev/null || true
        docker volume prune -f
        docker network prune -f
    - name: Start PostgreSQL
      shell: bash
      run: >
        echo "~~~~~~Start PostgreSQL~~~~~~"

        docker network create temporal-net 2>/dev/null || true

        POSTGRES_CONTAINER_ID=$(docker run -d \
          --network temporal-net \
          --name postgres-db \
          -e POSTGRES_USER=postgres \
          -e POSTGRES_PASSWORD=postgres \
          -e POSTGRES_DB=autokitteh \
          -p 5432:5432 \
          postgres:15-alpine)
        echo "POSTGRES_CONTAINER_ID=$POSTGRES_CONTAINER_ID" >> "$GITHUB_ENV"

        echo "Waiting for PostgreSQL to be ready..."

        # Wait until Postgres answers

        for i in {1..60}; do
          docker exec postgres-db pg_isready -U postgres >/dev/null 2>&1 && break
          [ $i -eq 60 ] && { echo "❌ PostgreSQL failed to start"; exit 1; }
          sleep 2
        done

        # Create databases

        docker exec postgres-db psql -U postgres -c "CREATE DATABASE temporal;" || true

        docker exec postgres-db psql -U postgres -c "CREATE DATABASE temporal_visibility;" || true

        docker exec postgres-db psql -U postgres -c "CREATE DATABASE autokitteh;" || true

        echo "Databases created successfully!"
    - name: Start Temporal dev
      shell: bash
      run: >
        echo "~~~~~~Start Temporal dev server~~~~~~"

        TEMPORAL_CONTAINER_ID=$(docker run -d \
          --network temporal-net \
          --name temporal-dev \
          -p 7233:7233 \
          temporalio/auto-setup:${{ inputs.temporal-version }})
        echo "TEMPORAL_CONTAINER_ID=$TEMPORAL_CONTAINER_ID" >> "$GITHUB_ENV"


        echo "Waiting for Temporal to be ready..."

        for i in {1..120}; do
          docker exec temporal-dev tctl --address localhost:7233 \
            namespace describe --ns default >/dev/null 2>&1 && { echo "✅ Temporal ready"; break; }
          [ $i -eq 120 ] && { echo "❌ Temporal failed to start"; docker logs temporal-dev --tail 50; exit 1; }
          sleep 2
        done
    - name: 🐳 Show Docker containers before AK
      shell: bash
      run: |
        echo "== Docker ps -a =="
        docker ps -a --filter network=temporal-net
        echo "== Network inspection =="
        docker network inspect temporal-net | jq '.[0].Containers'
        echo "== Logs of Postgres =="
        docker logs postgres-db --tail 20 || true
        echo "== Logs of Temporal =="
        docker logs temporal-dev --tail 20 || true
    - name: Start AutoKitteh Enterprise
      shell: bash
      env:
        DESCOPE_PROJECT_ID: ${{ inputs.descope-project-id }}
        RSA_PRIVATE_KEY: ${{ inputs.rsa-private-key }}
        RSA_PUBLIC_KEY: ${{ inputs.rsa-public-key }}
        TEMPORAL_ENCRYPTION_KEYS: ${{ inputs.temporal-encryption-keys }}
        AUTOKITTEH_IMAGE: ${{ inputs.autokitteh-image }}
      run: >
        echo "~~~~~~Starting AutoKitteh Enterprise~~~~~~"

        echo "Environment variables:"

        echo "- DESCOPE_PROJECT_ID: $DESCOPE_PROJECT_ID"

        echo "- RSA keys: $(echo "$RSA_PRIVATE_KEY" | wc -c) chars"

        echo "- TEMPORAL_ENCRYPTION_KEYS: $TEMPORAL_ENCRYPTION_KEYS"

        echo "- AUTOKITTEH_IMAGE: $AUTOKITTEH_IMAGE"


        CONTAINER_ID=$(docker run -d \
          --network temporal-net \
          --name autokitteh-ee \
          -p 9980:9980 \
          --add-host=host.docker.internal:host-gateway \
          -e AK_DB__TYPE=postgres \
          -e AK_DB__DSN=postgres://postgres:postgres@postgres-db:5432/autokitteh?sslmode=disable \
          -e AK_TEMPORALCLIENT__HOSTPORT=temporal-dev:7233 \
          -e AK_TEMPORALCLIENT__NAMESPACE=default \
          -e AK_AUTHHTTPMIDDLEWARE__USE_DEFAULT_USER=false \
          -e AK_AUTHLOGINHTTPSVC__DESCOPE__ENABLED=true \
          -e AK_AUTHLOGINHTTPSVC__DESCOPE__PROJECT_ID="$DESCOPE_PROJECT_ID" \
          -e AK_HTTP__CORS__ALLOWED_ORIGINS=http://localhost:8000 \
          -e AK_AUTHSESSIONS__ALLOWED_CORS_COOKIE=true \
          -e AK_AUTHJWTTOKENS__ALGORITHM=rsa \
          -e AK_AUTHJWTTOKENS__RSA__PRIVATE_KEY="$RSA_PRIVATE_KEY" \
          -e AK_AUTHJWTTOKENS__RSA__PUBLIC_KEY="$RSA_PUBLIC_KEY" \
          -e AK_TEMPORALCLIENT__DATA_CONVERTER__ENCRYPTION__KEYS="$TEMPORAL_ENCRYPTION_KEYS" \
          -e AK_SECRETS__PROVIDER=db \
          "$AUTOKITTEH_IMAGE" up)
        echo "CONTAINER_ID=$CONTAINER_ID" >> "$GITHUB_ENV"


        # Wait for health endpoint

        echo "Waiting for AutoKitteh to be ready..."

        for i in {1..60}; do
          if ! docker ps --format "{{.Names}}" | grep -q "autokitteh-ee"; then
            echo "❌ AutoKitteh container stopped!"
            docker logs autokitteh-ee --tail 50
            exit 1
          fi
          curl -fs http://localhost:9980/healthz >/dev/null 2>&1 && { echo '✅ AutoKitteh ready'; break; }
          [ $i -eq 60 ] && { echo "❌ AutoKitteh health check failed"; docker logs autokitteh-ee --tail 50; exit 1; }
          sleep 2
        done
    - name: Install Safari deps
      if: inputs.browser == 'Safari'
      shell: bash
      run: |
        echo "~~~~~~Install Safari deps~~~~~~"
        npx playwright install-deps webkit
    - name: Show container summary
      shell: bash
      run: >
        echo "~~~~~~Container Summary~~~~~~"

        docker ps --filter network=temporal-net --format "table {{.ID}}\t{{.Image}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"

        echo "~~~~~~Port Bindings Check~~~~~~"

        docker ps -a --filter network=temporal-net --format "table {{.Names}}\t{{.Ports}}"

        echo "~~~~~~Service Health Check~~~~~~"

        echo "PostgreSQL: $(docker exec postgres-db pg_isready -U postgres >/dev/null 2>&1 && echo 'Ready' || echo 'Not ready')"

        echo "Temporal: $(curl -fs http://localhost:7233/api/v1/namespaces/default >/dev/null 2>&1 && echo 'Ready' || echo 'Not ready')"

        echo "AutoKitteh: $(curl -fs http://localhost:9980/healthz >/dev/null 2>&1 && echo 'Ready' || echo 'Not ready')"
                
        # Final validation - ensure all services are ready

        if ! docker exec postgres-db pg_isready -U postgres >/dev/null 2>&1; then
          echo "⚠️ WARNING: PostgreSQL is not ready!"
        fi

        if ! curl -fs http://localhost:7233/api/v1/namespaces/default >/dev/null 2>&1; then
          echo "⚠️ WARNING: Temporal is not ready!"
        fi

        if ! curl -fs http://localhost:9980/healthz >/dev/null 2>&1; then
          echo "⚠️ WARNING: AutoKitteh is not ready!"
        fi
    - name: 📊 Show Docker stats and disk usage
      shell: bash
      run: >
        echo "~~~~~~Docker Resource Usage (snapshot)~~~~~~"

        docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}\t{{.BlockIO}}"

        echo ""

        echo "~~~~~~Disk Usage (df -h)~~~~~~"

        df -h
    - name: Capture container logs on failure
      if: failure()
      shell: bash
      run: |
        echo "~~~~~~Capturing container logs due to failure~~~~~~"
        echo "PostgreSQL logs:"
        docker logs postgres-db 2>&1 || echo "Failed to get PostgreSQL logs"
        echo ""
        echo "AutoKitteh logs:"
        docker logs autokitteh-ee 2>&1 || echo "Failed to get AutoKitteh logs"
        echo ""
        echo "Container status:"
        docker ps -a --filter network=temporal-net || true
