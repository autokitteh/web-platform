name: "Setup Test Environment (Enterprise)"
description: "Setup AutoKitteh EE with GitHub Actions services for PostgreSQL and Temporal"

inputs:
  descope-project-id:
    description: "Descope project ID"
    required: true
  browser:
    description: "Browser under test"
    required: true
  autokitteh-image:
    description: "AutoKitteh EE Docker image tag"
    required: true
  rsa-private-key:
    description: "RSA private key for JWT signing"
    required: true
  rsa-public-key:
    description: "RSA public key for JWT verification"
    required: true

runs:
  using: "composite"
  steps:
    # ───────────────────────────────────────────────────────────────
    # Setup databases (works with GitHub Actions services)
    - name: Setup PostgreSQL databases
      shell: bash
      run: |
        echo "~~~~~~Setting up PostgreSQL databases~~~~~~"
        # Install PostgreSQL client if not available
        sudo apt-get update && sudo apt-get install -y postgresql-client
        
        # Wait for PostgreSQL service to be ready
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Waiting for PostgreSQL service..."
          sleep 2
        done
        echo "PostgreSQL service is ready!"
        
        # Create databases
        PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE temporal;" || true
        PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE temporal_visibility;" || true
        PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE autokitteh;" || true
        echo "Databases created successfully!"

    # ───────────────────────────────────────────────────────────────
    # Wait for Temporal service
    - name: Wait for Temporal service
      shell: bash
      run: |
        echo "~~~~~~Waiting for Temporal service~~~~~~"
        # Wait for Temporal API to be ready
        for i in {1..60}; do
          curl -fs http://localhost:7233/api/v1/namespaces >/dev/null 2>&1 && { echo "Temporal API ready!"; break; }
          [ $i -eq 60 ] && { echo "Temporal API failed to start"; exit 1; }
          echo "Waiting for Temporal... ($i/60)"
          sleep 2
        done

    # ───────────────────────────────────────────────────────────────
    # Start AutoKitteh EE
    - name: Start AutoKitteh Enterprise
      shell: bash
      env:
        DESCOPE_PROJECT_ID: ${{ inputs.descope-project-id }}
        RSA_PRIVATE_KEY: ${{ inputs.rsa-private-key }}
        RSA_PUBLIC_KEY: ${{ inputs.rsa-public-key }}
        AUTOKITTEH_IMAGE: ${{ inputs.autokitteh-image }}
      run: |
        echo "~~~~~~Starting AutoKitteh Enterprise~~~~~~"
        CONTAINER_ID=$(docker run -d \
          --network host \
          -e AK_DB__TYPE=postgres \
          -e AK_DB__DSN=postgres://postgres:postgres@localhost:5432/autokitteh?sslmode=disable \
          -e AK_TEMPORALCLIENT__HOSTPORT=localhost:7233 \
          -e AK_TEMPORALCLIENT__NAMESPACE=default \
          -e AK_AUTHHTTPMIDDLEWARE__USE_DEFAULT_USER=false \
          -e AK_AUTHLOGINHTTPSVC__DESCOPE__ENABLED=true \
          -e AK_AUTHLOGINHTTPSVC__DESCOPE__PROJECT_ID="$DESCOPE_PROJECT_ID" \
          -e AK_HTTP__CORS__ALLOWED_ORIGINS=http://localhost:8000 \
          -e AK_AUTHSESSIONS__ALLOWED_CORS_COOKIE=true \
          -e AK_AUTHJWTTOKENS__ALGORITHM=rsa \
          -e AK_AUTHJWTTOKENS__RSA__PRIVATE_KEY="$RSA_PRIVATE_KEY" \
          -e AK_AUTHJWTTOKENS__RSA__PUBLIC_KEY="$RSA_PUBLIC_KEY" \
          -e AK_SECRETS__PROVIDER=db \
          "$AUTOKITTEH_IMAGE" up)
        echo "CONTAINER_ID=$CONTAINER_ID" >> "$GITHUB_ENV"

        echo "Waiting for AutoKitteh to be ready..."
        for i in {1..60}; do
          curl -fs http://localhost:9980/healthz >/dev/null 2>&1 && { echo "AutoKitteh ready!"; break; }
          [ $i -eq 60 ] && { echo "AutoKitteh failed to start"; docker logs $CONTAINER_ID; exit 1; }
          printf '.'; sleep 2
        done

    # ───────────────────────────────────────────────────────────────
    - name: Tail AutoKitteh logs (background)
      shell: bash
      run: |
        docker logs -f $CONTAINER_ID > docker-logs.txt 2>&1 &
        echo "LOGS_PID=$!" >> "$GITHUB_ENV"

    - name: Install Safari deps
      if: inputs.browser == 'Safari'
      shell: bash
      run: npx playwright install-deps webkit

    - name: Show service status
      shell: bash
      run: |
        echo "~~~~~~Service Status~~~~~~"
        echo "PostgreSQL: $(pg_isready -h localhost -p 5432 -U postgres && echo 'Ready' || echo 'Not ready')"
        echo "Temporal: $(curl -fs http://localhost:7233/api/v1/namespaces >/dev/null 2>&1 && echo 'Ready' || echo 'Not ready')"
        echo "AutoKitteh: $(curl -fs http://localhost:9980/healthz >/dev/null 2>&1 && echo 'Ready' || echo 'Not ready')"
        if [ ! -z "$CONTAINER_ID" ]; then
          echo "AutoKitteh Container:"
          docker ps --filter id=$CONTAINER_ID --format "table {{.ID}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"
        fi
